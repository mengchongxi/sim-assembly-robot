# MPPI 控制器基础配置 — trot 步态
# ==============================================================================
# 通过 robot 段区分不同机器人，通过 --robot-id 覆盖 output_dir
# ==============================================================================

# 实验基础设置
seed: 0
output_dir: "output/mppi_{robot_id}"
n_steps: 800

# DIAL-MPC 算法参数
Nsample: 2024
Hsample: 16
Hnode: 4
Ndiffuse: 3
Ndiffuse_init: 10
temp_sample: 0.05
horizon_diffuse_factor: 0.9
traj_diffuse_factor: 0.5
update_method: "mppi"

# 环境物理参数
dt: 0.02
timestep: 0.02
leg_control: "torque"
action_scale: 1.0

# PD 控制参数
kp: 100.0
kd: 2.0

# 运动目标参数
default_vx: 0.8
default_vy: 0.0
default_vyaw: 0.0
ramp_up_time: 1.0
gait: "trot"

# 调试
debug: false
randomize_tasks: false

# 机器人特定配置（可通过单独 YAML 覆盖或 CLI 参数调整）
robot:
  model_path: "models/mujoco/icra2026_model/dog_1_dog.xml"
  pos_tar_z: 0.45
  foot_radius: 0.0175
  torso_body_name: "module1"
  feet_site_names: ["FL_foot", "FR_foot", "RL_foot", "RR_foot"]
  # joint_range_override: null  # 留空则使用 DreamerEnv 默认值
  # gait_params_override: null  # 留空则使用 DreamerEnv 默认值
